<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Radar-66 — Ежедневный тематический дайджест</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 900px;
      margin: 24px auto;
      padding: 0 16px 40px;
      line-height: 1.5;
    }
    h1 { font-size: 26px; margin: 0 0 8px; }
    h2 { font-size: 20px; margin-top: 24px; }
    p { margin: 4px 0 10px; }
    label { display: block; margin: 10px 0 4px; font-weight: 500; }
    input[type="text"], select {
      width: 100%;
      padding: 6px 8px;
      font: inherit;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      margin-top: 12px;
      padding: 8px 16px;
      font: inherit;
      border-radius: 4px;
      border: 1px solid #444;
      background: #222;
      color: #fff;
      cursor: pointer;
    }
    button:disabled {
      opacity: .6;
      cursor: default;
    }
    #feed-preview {
      margin: 18px 0;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      max-height: 260px;
      overflow: auto;
      font-size: 14px;
      background: #fafafa;
    }
    #feed-preview ul {
      margin: 4px 0 0;
      padding-left: 18px;
    }
    #result {
      margin-top: 10px;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      min-height: 140px;
      white-space: pre-wrap;
      background: #fff;
    }
    .error {
      color: #b00020;
      margin-top: 8px;
      font-size: 14px;
    }
    .hint {
      font-size: 13px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>Radar-66 — Ежедневный тематический дайджест</h1>
  <p class="hint">
    Лента берётся из <code>cache.json</code> (sources[].articles[]),
    текст собирается локальным сервером <code>server.py</code> на
    <code>http://127.0.0.1:8000/generate</code>.
  </p>

  <div>
    <label for="topic">Тема выпуска:</label>
    <input id="topic" type="text" placeholder="Например: Низкая производительность труда как вызов логистики">

    <label for="section">Раздел:</label>
    <select id="section">
      <option value="IT-новости">IT-новости</option>
      <option value="Технические сайты / инфраструктура">Технические сайты / инфраструктура</option>
      <option value="Юридические и правовые новости">Юридические и правовые новости</option>
      <option value="Финансы и экономика">Финансы и экономика</option>
      <option value="Культура / наука">Культура / наука</option>
      <option value="Вопросы, волнующие читателя">Вопросы, волнующие читателя</option>
    </select>

    <button id="run">Собрать дайджест</button>
    <div id="error" class="error"></div>
  </div>

  <div id="feed-preview">
    <strong>Материалы, которые попали в выпуск:</strong>
    <ul id="feed-list"></ul>
  </div>

  <h2>Результат</h2>
  <div id="result"></div>

  <script>
    async function loadFeed() {
      const resp = await fetch('cache.json', { cache: 'no-store' });
      if (!resp.ok) {
        throw new Error('HTTP ' + resp.status);
      }
      const data = await resp.json();

      const sources = Array.isArray(data.sources) ? data.sources : [];
      const allArticles = [];
      sources.forEach(src => {
        if (Array.isArray(src.articles)) {
          allArticles.push(...src.articles);
        }
      });

      return allArticles;
    }

    function extractKeywords(topic) {
      const base = ['логистика', 'склад', 'доставка', 'цепочки поставок', 'supply chain',
                    'эффективность', 'производительность', 'бизнес', 'экономика'];
      if (!topic) return base;

      const words = topic
        .toLowerCase()
        .replace(/[^\p{L}\p{N}\s]+/gu, ' ')
        .split(/\s+/)
        .filter(w => w.length > 3);

      const unique = Array.from(new Set([...words, ...base]));
      return unique;
    }

    function buildArticlesWithThesis(feedItems, topic) {
      const keywords = extractKeywords(topic);
      const articles = Array.isArray(feedItems) ? feedItems : [];

      const scored = articles.map(item => {
        const title = (item.title || '').toLowerCase();
        const desc = (item.description || '').toLowerCase();
        let score = 0;
        keywords.forEach(k => {
          if (!k) return;
          if (title.includes(k)) score += 3;
          if (desc.includes(k)) score += 1;
        });
        return { item, score };
      });

      const relevant = scored
        .filter(x => x.score > 0)
        .sort((a, b) => b.score - a.score)
        .slice(0, 20)
        .map(x => x.item);

      const used = relevant.length ? relevant : articles.slice(0, 10);

      const withThesis = used.map((item, idx) => {
        const title = item.title || '';
        const link = item.link || item.id || '';
        const rawDesc = item.description || '';
        const thesis = rawDesc.length > 300 ? rawDesc.slice(0, 297) + '…' : rawDesc;

        return {
          index: idx + 1,
          title,
          link,
          thesis
        };
      });

      return withThesis;
    }

    function renderFeedItems(articlesWithThesis) {
      const list = document.getElementById('feed-list');
      list.innerHTML = '';

      if (!articlesWithThesis.length) {
        const li = document.createElement('li');
        li.textContent = 'Нет релевантных материалов в cache.json';
        list.appendChild(li);
        return;
      }

      articlesWithThesis.forEach(a => {
        const li = document.createElement('li');
        const shortThesis = a.thesis
          ? (a.thesis.length > 120 ? a.thesis.slice(0, 117) + '…' : a.thesis)
          : '';

        li.textContent = `[${a.index}] ${a.title}` + (shortThesis ? ` — ${shortThesis}` : '');
        list.appendChild(li);
      });
    }

    async function callBackend(prompt) {
      const resp = await fetch('http://127.0.0.1:8000/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });
      if (!resp.ok) {
        throw new Error('HTTP ' + resp.status);
      }
      const data = await resp.json();
      return data.result || '';
    }

    function buildPrompt(topic, section, articlesWithThesis) {
      const newsLines = (articlesWithThesis || []).map(a => {
        const title = a.title || '';
        const link = a.link || '';
        const thesis = a.thesis || '';
        return `[${a.index}] ${title}${link ? ' — ' + link : ''}${thesis ? ' — ' + thesis : ''}`;
      }).join('\n');

      const basePrompt = `
Ты — редактор и автор аналитических материалов для деловой аудитории: руководители, логистические директора, менеджеры по развитию, владельцы бизнеса.

Твоя задача — по заданной теме и подборке свежих материалов из IT/бизнес‑медиа подготовить один универсальный текст, который можно без правок публиковать:
- как статью в блоге/на сайте;
- как пост в Телеграм‑канале;
- как материал для Дзена.

Требования к результату:
1. Структура:
   - Сначала ЧЁТКИЙ заголовок (одной строкой).
   - Затем короткий лид — 1–2 предложения, которые цепляют и сразу объясняют, о чём текст и почему это важно.
   - Дальше 3–5 абзацев основного текста.
   - В конце отдельный заключительный абзац с выводом и рекомендациями (что делать читателю, на что обратить внимание).

2. Объём и стиль:
   - Примерный объём: 400–800 слов.
   - Стиль: деловой, но живой; без канцелярита и «воды».
   - Пиши простыми понятными фразами, как хороший редактор делового медиа.
   - Избегай списков и маркированных пунктов — только цельный связный текст.

3. Работа с источниками:
   - Используй только переданные материалы из новостной ленты (см. ниже список).
   - Обязательно опирайся минимум на 3–5 разных материалов.
   - Не пересказывай каждую новость отдельно; сгруппируй по смыслу.
   - В тексте ссылайся на материалы через их номера в квадратных скобках вида [1], [2] и т.д., используя список ниже.
   - В конце текста выведи короткий раздел «Источники:» со списком вида:
     [1] Заголовок — ссылка
     [2] Заголовок — ссылка

4. Фокус:
   - Главный фокус — российская экономика и производительность труда, логистика и смежные отрасли (склады, транспорт, цепочки поставок, IT‑инфраструктура в логистике).
   - Если тема выпуска напрямую не про логистику, ищи и подчёркивай её связь с логистическими и операционными процессами: влияние на эффективность, издержки, кадры, технологии.
   - Всё, что не удаётся привязать к бизнесу и логистике, используй минимально или опускай.

Исходные данные для выпуска:
- Тема выпуска: «${topic || 'без явной темы'}».
- Раздел: «${section}».
- Материалы из новостной ленты (заголовки, ссылки и краткие тезисы):
${newsLines}

Сначала проанализируй, какие ключевые линии и тренды вытекают из этих материалов применительно к теме выпуска и логистике/операционному управлению. Затем на основе этого анализа напиши ОДИН цельный текст по описанным выше правилам.

В ответе выведи только готовый материал в следующем формате (без служебных комментариев и пояснений):

ЗАГОЛОВОК

ЛИД — 1–2 предложения.

ОСНОВНОЙ ТЕКСТ — 3–5 абзацев.

ФИНАЛЬНЫЙ АБЗАЦ С ВЫВОДОМ И РЕКОМЕНДАЦИЯМИ.

Источники:
[1] …
[2] …
[3] …
`.trim();

      return basePrompt;
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const errorEl = document.getElementById('error');
      const resultEl = document.getElementById('result');
      const runBtn = document.getElementById('run');

      let feedItems = [];
      let articlesWithThesis = [];

      try {
        feedItems = await loadFeed();
        articlesWithThesis = buildArticlesWithThesis(feedItems, '');
        renderFeedItems(articlesWithThesis);
      } catch (e) {
        console.error(e);
        errorEl.textContent = 'Не удалось загрузить cache.json (проверь, что он лежит в той же папке, что index.html).';
      }

      runBtn.addEventListener('click', async () => {
        errorEl.textContent = '';
        const topic = document.getElementById('topic').value.trim();
        const section = document.getElementById('section').value;

        articlesWithThesis = buildArticlesWithThesis(feedItems, topic || section || '');
        renderFeedItems(articlesWithThesis);

        runBtn.disabled = true;
        resultEl.textContent = 'Генерация дайджеста...';

        try {
          const prompt = buildPrompt(topic, section, articlesWithThesis);
          const text = await callBackend(prompt);
          resultEl.textContent = text || 'Пустой ответ от модели.';
        } catch (e) {
          console.error(e);
          resultEl.textContent = '';
          errorEl.textContent = 'Ошибка генерации (проверь, что server.py запущен на 127.0.0.1:8000 и путь /generate).';
        } finally {
          runBtn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
