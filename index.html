<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Radar-66</title>
</head>
<body>
  <h1>Radar-66</h1>

  <div id="digest-tool">
    <h2>Ежедневный тематический дайджест</h2>

    <label>
      Тема:
      <input type="text" id="user-task" size="80" placeholder="Что писать в вакансиях, чтобы не разрушать доверие на первых строках">
    </label>

    <br><br>

    <label>
      Раздел:
      <select id="topic-select">
        <option value="it-news">IT-новости</option>
        <option value="tech-infra">Технические сайты / инфраструктура</option>
        <option value="law">Юридические и правовые новости</option>
        <option value="finance-economy">Финансы и экономика</option>
        <option value="culture-science">Культура / наука</option>
        <option value="people-issues">Вопросы, волнующие читателя</option>
      </select>
    </label>

    <br><br>

    <button id="build-digest">Собрать дайджест</button>

    <div id="status" style="margin-top: 10px; color: #555;"></div>

    <h2>Результат</h2>
    <div id="digest-result" style="white-space: pre-wrap; margin-top: 10px; border: 1px solid #ccc; padding: 10px;"></div>
  </div>

  <script>
    async function loadFeed() {
      const response = await fetch('cache.json');
      if (!response.ok) {
        console.error('Не удалось загрузить cache.json');
        return [];
      }
      const data = await response.json();
      return data.items || data;
    }

    function buildPrompt(userTask, topicId, feedItems) {
      const topics = {
        'it-news': {
          name: 'IT-новости',
          description: 'Система построения и автоматизации вычислительных процессов',
        },
        'tech-infra': {
          name: 'Технические сайты / инфраструктура',
          description: 'Передовые разработки и новости дня, влияющие на продуктивность',
        },
        'law': {
          name: 'Юридические и правовые новости',
          description: 'Изменения в законодательстве, новые указы и реформы',
        },
        'finance-economy': {
          name: 'Финансы и экономика',
          description: 'Новости о состоянии экономики и финансовой политики, ожидания и прогнозы',
        },
        'culture-science': {
          name: 'Культура / наука',
          description: 'Новости и передовые разработки, перспективы развития энергоснабжения и других передовых отраслей',
        },
        'people-issues': {
          name: 'Вопросы, волнующие читателя',
          description: 'Текущие проблемы рядового человека, его боль и отношение к происходящему в России',
        },
      };

      const topic = topics[topicId];

      const basePrompt = `
Ты — редакционный ИИ-помощник, который готовит тематический дайджест и заготовки материалов для Блога, Телеграма и Дзена.

Контекст раздела:
- ID раздела: ${topicId}
- Название раздела: ${topic.name}
- Описание раздела: ${topic.description}

Задание пользователя:
- Тема: "${userTask}"

Входные данные:
- Ниже тебе будет передан список свежих новостей в формате:
  [ЗАГОЛОВОК] — [КРАТКОЕ ОПИСАНИЕ] — [ССЫЛКА]

НОВОСТИ:
`.trim();

      const newsLines = (feedItems || []).slice(0, 10).map(item => {
        const title = item.title || '';
        const summary = item.summary || item.description || '';
        const link = item.url || item.link || '';
        return `[${title}] — ${summary} — ${link}`;
      }).join('\n');

      const fullPrompt = basePrompt + '\n\n' + newsLines + `

Твоя задача:
1) Отобрать только те новости, которые помогают раскрыть тему задания и соответствуют контексту раздела.
2) На основе отобранных новостей:
   - составить краткий обзор по теме;
   - сформировать структуру и тезисы для одной статьи в блог;
   - предложить 2–3 варианта постов для Телеграма;
   - предложить 1–2 варианта материала для Дзена.

Формат ответа:
1. "Обзор по теме".
2. "Статья для блога".
3. "Посты для Телеграма".
4. "Материалы для Дзена".
`;

      return fullPrompt;
    }

    async function sendToLocalServer(prompt) {
      const resp = await fetch("http://127.0.0.1:8000/digest", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ prompt })
      });

      if (!resp.ok) {
        const text = await resp.text();
        throw new Error("Ошибка сервера: " + text);
      }

      const data = await resp.json();
      return data.result;
    }

    document.getElementById('build-digest').addEventListener('click', async () => {
      const statusEl = document.getElementById('status');
      const resultEl = document.getElementById('digest-result');
      resultEl.textContent = "";
      statusEl.textContent = "Собираю новости и отправляю запрос на локальный сервер...";

      try {
        const userTask = document.getElementById('user-task').value.trim();
        const topicId = document.getElementById('topic-select').value;

        if (!userTask) {
          statusEl.textContent = "Введите тему.";
          return;
        }

        const feedItems = await loadFeed();
        if (!feedItems || feedItems.length === 0) {
          statusEl.textContent = "Не удалось получить новости из cache.json.";
          return;
        }

        const prompt = buildPrompt(userTask, topicId, feedItems);

        const aiText = await sendToLocalServer(prompt);

        statusEl.textContent = "Готово.";
        resultEl.textContent = aiText;
      } catch (err) {
        console.error(err);
        statusEl.textContent = "Ошибка: " + err.message;
      }
    });
  </script>
</body>
</html>
