<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Radar-66 — Ежедневный тематический дайджест</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 900px;
      margin: 24px auto;
      padding: 0 16px 40px;
      line-height: 1.5;
    }
    h1 { font-size: 26px; margin: 0 0 8px; }
    h2 { font-size: 20px; margin-top: 24px; }
    p { margin: 4px 0 10px; }
    label { display: block; margin: 10px 0 4px; font-weight: 500; }
    input[type="text"], select, textarea {
      width: 100%;
      padding: 6px 8px;
      font: inherit;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      margin-top: 12px;
      padding: 8px 16px;
      font: inherit;
      border-radius: 4px;
      border: 1px solid #444;
      background: #222;
      color: #fff;
      cursor: pointer;
    }
    button:disabled {
      opacity: .6;
      cursor: default;
    }
    #feed-preview {
      margin: 18px 0;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      max-height: 260px;
      overflow: auto;
      font-size: 14px;
      background: #fafafa;
    }
    #feed-preview ul {
      margin: 4px 0 0;
      padding-left: 18px;
    }
    #result {
      margin-top: 10px;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      min-height: 140px;
      white-space: pre-wrap;
      background: #fff;
    }
    .error {
      color: #b00020;
      margin-top: 8px;
      font-size: 14px;
    }
    .hint {
      font-size: 13px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>Radar-66 — Ежедневный тематический дайджест</h1>
  <p class="hint">Лента берётся из <code>cache.json</code>, текст собирается локальным сервером на <code>http://127.0.0.1:8000/generate</code>.</p>

  <div>
    <label for="topic">Тема выпуска:</label>
    <input id="topic" type="text" placeholder="Например: Генеративный ИИ в логистике">

    <label for="section">Раздел:</label>
    <select id="section">
      <option value="IT-новости">IT-новости</option>
      <option value="Технические сайты / инфраструктура">Технические сайты / инфраструктура</option>
      <option value="Юридические и правовые новости">Юридические и правовые новости</option>
      <option value="Финансы и экономика">Финансы и экономика</option>
      <option value="Культура / наука">Культура / наука</option>
      <option value="Вопросы, волнующие читателя">Вопросы, волнующие читателя</option>
    </select>

    <button id="run">Собрать дайджест</button>
    <div id="error" class="error"></div>
  </div>

  <div id="feed-preview">
    <strong>Последние материалы из ленты:</strong>
    <ul id="feed-list"></ul>
  </div>

  <h2>Результат</h2>
  <div id="result"></div>

  <script>
    // Загрузка ленты из cache.json (JSON Feed: data.items — массив объектов) [web:52][web:55]
    async function loadFeed() {
      const resp = await fetch('cache.json', { cache: 'no-store' });
      if (!resp.ok) {
        throw new Error('HTTP ' + resp.status);
      }
      const data = await resp.json();

      // если osmosfeed отдаёт чистый JSON Feed
      if (Array.isArray(data.items)) {
        return data.items;
      }

      // запасной вариант: items внутри первого feed, если структура вида { feeds: [ { items: [...] } ] } [web:58]
      if (Array.isArray(data.feeds) && data.feeds[0] && Array.isArray(data.feeds[0].items)) {
        return data.feeds[0].items;
      }

      return [];
    }

    function renderFeedItems(feedItems) {
      const latest = (feedItems || []).slice(0, 10);
      const list = document.getElementById('feed-list');
      list.innerHTML = '';

      if (!latest.length) {
        const li = document.createElement('li');
        li.textContent = 'Нет данных в cache.json';
        list.appendChild(li);
        return;
      }

      latest.forEach(item => {
        const li = document.createElement('li');
        const title = item.title || item.content_text || item.content_html || item.url || '';
        li.textContent = title;
        list.appendChild(li);
      });
    }

    async function callBackend(prompt) {
      const resp = await fetch('http://127.0.0.1:8000/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });
      if (!resp.ok) {
        throw new Error('HTTP ' + resp.status);
      }
      const data = await resp.json();
      return data.result || '';
    }

    function buildPrompt(topic, section, feedItems) {
      const latest = (feedItems || []).slice(0, 20);

      const bullets = latest.map(item => {
        const title = item.title || item.content_text || '';
        const url = item.url || '';
        const date = item.date_published || item.published || '';
        return `- ${title}${date ? ' (' + date + ')' : ''}${url ? ' — ' + url : ''}`;
      }).join('\n');

      return [
        `Ты пишешь ежедневный новостной дайджест для раздела "${section}".`,
        `Тема выпуска: "${topic || 'без явной темы'}".`,
        `Ниже список материалов из ленты. Используй только их содержимое и заголовки:`,
        bullets,
        `Сделай связный авторский обзор на русском языке: 3–7 абзацев, без маркированных списков.`,
        `Структура: короткое вступление, затем логичные блоки по подтемам, в конце один вывод для читателя.`,
        `Пиши в деловом, но живом тоне, ориентируйся на аудиторию: руководители и специалисты в сфере логистики и смежных областях.`
      ].join('\n\n');
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const errorEl = document.getElementById('error');
      const resultEl = document.getElementById('result');
      const runBtn = document.getElementById('run');

      let feedItems = [];

      // первая загрузка ленты
      try {
        feedItems = await loadFeed();
        renderFeedItems(feedItems);
      } catch (e) {
        console.error(e);
        errorEl.textContent = 'Не удалось загрузить cache.json (проверь osmosfeed и GitHub Pages).';
      }

      runBtn.addEventListener('click', async () => {
        errorEl.textContent = '';
        const topic = document.getElementById('topic').value.trim();
        const section = document.getElementById('section').value;

        runBtn.disabled = true;
        resultEl.textContent = 'Генерация дайджеста...';

        try {
          const prompt = buildPrompt(topic, section, feedItems);
          const text = await callBackend(prompt);
          resultEl.textContent = text || 'Пустой ответ от модели.';
        } catch (e) {
          console.error(e);
          resultEl.textContent = '';
          errorEl.textContent = 'Ошибка генерации (проверь, что server.py запущен на 127.0.0.1:8000).';
        } finally {
          runBtn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
